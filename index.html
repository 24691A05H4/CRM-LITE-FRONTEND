  <title>Startup CRM Lite</title>
  <script>
    (function() {
      try {
        var theme = window.localStorage.getItem('startup-crm-theme');
        // useLocalStorage stores values as JSON, so 'true' or 'false'
        if (theme === 'true') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {}
    })();
  </script>
